<!DOCTYPE html>
<html lang="en" class="h-full bg-white">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/media/css/style.css">
    <title>Log in - Shopeeze</title>
</head>

<body class="h-full flex justify-center items-center">
    <div class="w-96 xl:w-[27rem]">
        <div>
            <a href="/">
                <img class="mx-auto h-9 w-auto" src="/media/images/shopeeze-logo.svg" alt="shopeeze-logo">
            </a>
            <h2 class="mt-8 text-center text-2xl font-bold  text-gray-900">Log in to your account</h2>
        </div>

        <div class="mt-8">
            <form class="space-y-6" action="#" method="POST">
                {% csrf_token %}
                {% include "base/alert.html" %}

                <div>
                    <label for="email" class="block font-medium  text-gray-900">Email address</label>
                    <div class="mt-2">
                        <input id="email" name="email" type="email" autocomplete="email" required 
                        class="block w-full rounded-md border-0 py-1.5 px-3 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-blue-400 outline-none h-10">
                    </div>
                </div>

                <div>
                    <div class="flex items-center justify-between">
                        <label for="password" class="block font-medium text-gray-900">Password</label>
                        <div class="">
                            <a href="#" class="font-semibold text-indigo-600 hover:text-indigo-500">Forgot password?</a>
                        </div>
                    </div>
                    <div class="mt-2">
                        <input id="password" name="password" type="password" autocomplete="current-password" required 
                        class="block w-full rounded-md border-0 py-1.5 px-3 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-blue-400 outline-none h-10">
                    </div>
                </div>

                <div>
                    <button type="submit"
                        class="flex w-full justify-center rounded-md bg-indigo-600 px-3 py-1.5 font-semibold text-white shadow-sm hover:bg-indigo-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600 text-lg h-12 items-center">Log in</button>
                </div>
            </form>

            <p class="mt-8 text-center text-gray-500">
                Do not have an account?
                <a href="/accounts/sign-up/" class="font-semibold  text-indigo-600 hover:text-indigo-500">Create account</a>
            </p>
        </div>
    </div>
</body>

</html>
